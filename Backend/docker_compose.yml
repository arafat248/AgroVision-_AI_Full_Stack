version: '3.8'
services:
  db:
    image: postgres:16-alpine
    container_name: agrovision_db
    restart: always
    environment:
      - POSTGRES_DB=agro_db
      - POSTGRES_USER=agro_user
      - POSTGRES_PASSWORD=agro_pass
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
  web:
    build:
      context: .
      dockerfile: ./docker/local/Dockerfile
    container_name: agrovision_web
    restart: always
    command: /app/docker/local/entrypoint.sh
    environment:
      - SECRET_KEY=django-insecure-docker-compose-secret-key-987654321
      - DEBUG=True
      - ALLOWED_HOSTS=*
      - DATABASE_URL=postgres://agro_user:agro_pass@db:5432/agro_db
      - CORS_ALLOW_ALL_ORIGINS=True
      - DJANGO_LOG_LEVEL=INFO
    ports:
      - "8000:8000"
    volumes:
      - .:/app
    depends_on:
      - db
volumes:
  postgres_data:
